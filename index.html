<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Harga BBM Pertamina - Real Time</title>
    <style>
        :root {
            --pertamina-red: #e1251b;
            --pertamina-blue: #00549b;
            --pertamina-green: #29a745;
            --dark: #333;
            --light: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--light);
            color: var(--dark);
        }

        header {
            background: linear-gradient(135deg, var(--pertamina-blue), #003d70);
            color: white;
            padding: 2rem 1rem;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .container {
            max-width: 1000px;
            margin: -40px auto 40px auto;
            padding: 0 20px;
        }

        .update-info {
            background: white;
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-block;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            font-size: 0.85rem;
            margin-bottom: 20px;
            border: 1px solid #ddd;
        }

        .grid-prices {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            transition: transform 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 6px;
        }

        /* Warna spesifik produk */
        .pertamax { border-top: 6px solid var(--pertamina-blue); }
        .pertamax-turbo { border-top: 6px solid var(--pertamina-red); }
        .dexlite { border-top: 6px solid var(--pertamina-green); }

        .card h3 {
            margin: 0;
            color: var(--dark);
            font-size: 1.4rem;
            text-transform: uppercase;
        }

        .price {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 15px 0;
            color: #222;
        }

        .price span {
            font-size: 1rem;
            color: #888;
        }

        .status {
            font-size: 0.8rem;
            padding: 5px 12px;
            border-radius: 20px;
            background: #e8f5e9;
            color: #2e7d32;
            display: inline-block;
        }

        .footer {
            text-align: center;
            margin-top: 50px;
            color: #888;
            font-size: 0.9rem;
        }

        /* Animasi loading */
        .shimmer {
            background: #eee;
            background: linear-gradient(110deg, #ececec 8%, #f5f5f5 18%, #ececec 33%);
            background-size: 200% 100%;
            animation: 1.5s shine linear infinite;
        }

        @keyframes shine {
            to { background-position-x: -200%; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Harga BBM Pertamina</h1>
        <p>Wilayah: DKI Jakarta & Sekitarnya</p>
    </header>

    <div class="container">
        <center>
            <div class="update-info">
                🔴 Live: Terakhir diperbarui pada <span id="last-update">-</span>
            </div>
        </center>

        <div id="price-container" class="grid-prices">
            <div class="card shimmer" style="height: 200px;"></div>
            <div class="card shimmer" style="height: 200px;"></div>
            <div class="card shimmer" style="height: 200px;"></div>
        </div>

        <div class="footer">
            <p>&copy; 2026 Monitoring Harga BBM. Data disimulasikan untuk keperluan pengembangan.</p>
        </div>
    </div>

    <script>
        // Simulasi Data API (Karena API asli membutuhkan Key/Scrapping)
        const fetchFuelPrices = () => {
            return new Promise((resolve) => {
                setTimeout(() => {
                    resolve([
                        { name: "Pertamax", price: 12950, class: "pertamax" },
                        { name: "Pertamax Turbo", price: 14400, class: "pertamax-turbo" },
                        { name: "Dexlite", price: 14550, class: "dexlite" },
                        { name: "Pertamina Dex", price: 15100, class: "pertamax-turbo" },
                        { name: "Pertalite", price: 10000, class: "pertamax" }
                    ]);
                }, 1000); // Simulasi delay jaringan
            });
        };

        const formatRupiah = (number) => {
            return new Intl.NumberFormat('id-ID', {
                style: 'currency',
                currency: 'IDR',
                minimumFractionDigits: 0
            }).format(number);
        };

        async function updateDashboard() {
            const container = document.getElementById('price-container');
            const timeDisplay = document.getElementById('last-update');

            try {
                const data = await fetchFuelPrices();
                
                // Bersihkan kontainer
                container.innerHTML = '';

                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = `card ${item.class}`;
                    card.innerHTML = `
                        <h3>${item.name}</h3>
                        <div class="price">${formatRupiah(item.price)}<span>/Liter</span></div>
                        <div class="status">Harga Tetap</div>
                    `;
                    container.appendChild(card);
                });

                // Update waktu
                const now = new Date();
                timeDisplay.innerText = now.toLocaleTimeString('id-ID') + ' WIB';

            } catch (error) {
                container.innerHTML = `<p style="color:red">Gagal memuat data harga.</p>`;
            }
        }

        // Jalankan saat load
        updateDashboard();

        // Refresh otomatis setiap 1 jam (simulasi real-time)
        setInterval(updateDashboard, 3600000);
    </script>
</body>
</html>
